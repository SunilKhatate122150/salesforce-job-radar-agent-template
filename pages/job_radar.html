<div class="radar-v3-header">
  <div class="logo" style="font-family:'Syne',sans-serif; font-weight:800; font-size:0.9rem; background:linear-gradient(135deg,#fff 20%,var(--cyan) 100%); -webkit-background-clip:text; -webkit-text-fill-color:transparent;">Job Radar <span style="opacity:0.4; font-weight:400;">/</span> SF Agent <span style="opacity:0.4; font-weight:400;">2026</span></div>
  <div style="width:1px; height:20px; background:var(--border);"></div>
  <div class="pipe-stats">
    <div class="pstat" onclick="scrollToCol('todo')">
      <span class="pdot todo"></span>
      <div class="pinfo"><span class="pcount" id="cnt-todo">0</span><span class="plbl">To Apply</span></div>
    </div>
    <div class="pstat" onclick="scrollToCol('applied')">
      <span class="pdot applied"></span>
      <div class="pinfo"><span class="pcount" id="cnt-applied">0</span><span class="plbl">Applied</span></div>
    </div>
    <div class="pstat" onclick="scrollToCol('interview')">
      <span class="pdot interview"></span>
      <div class="pinfo"><span class="pcount" id="cnt-interview">0</span><span class="plbl">Interview</span></div>
    </div>
    <div class="pstat" onclick="scrollToCol('offer')">
      <span class="pdot offer"></span>
      <div class="pinfo"><span class="pcount" id="cnt-offer">0</span><span class="plbl">Offer</span></div>
    </div>
    <div class="pstat" onclick="scrollToCol('rejected')">
      <span class="pdot rejected"></span>
      <div class="pinfo"><span class="pcount" id="cnt-rejected">0</span><span class="plbl">Rejected</span></div>
    </div>
  </div>
  <div style="display:flex; gap:6px;">
    <button class="btn-sm" onclick="clearAndSyncJobs()" style="background:transparent; border:1px solid var(--border); color:var(--text3); padding:4px 12px; border-radius:7px; font-size:10px; font-weight:700; cursor:pointer;">↺ Sync</button>
    <button class="btn-sm" onclick="toggleLog()" style="background:transparent; border:1px solid var(--border); color:var(--text3); padding:4px 12px; border-radius:7px; font-size:10px; font-weight:700; cursor:pointer;">📊 Log</button>
  </div>
</div>

<div class="analytics-bar-v3">
  <div class="met"><span class="met-val" id="met-rate">0%</span><span class="met-lbl">Response Rate</span></div>
  <div style="width:1px; height:24px; background:var(--border);"></div>
  <div class="met"><span class="met-val" id="met-conversion">0%</span><span class="met-lbl">Intrv → Offer</span></div>
  <div style="width:1px; height:24px; background:var(--border);"></div>
  <div class="met"><span class="met-val" id="met-followup">0</span><span class="met-lbl">Follow-ups Due</span></div>
  <div style="width:1px; height:24px; background:var(--border);"></div>
  <div class="goal-wrap" style="display:flex; align-items:center; gap:10px;">
    <svg class="goal-ring-v3" viewBox="0 0 36 36">
      <circle class="goal-track" cx="18" cy="18" r="15.9"/>
      <circle class="goal-arc" id="goal-arc" cx="18" cy="18" r="15.9" stroke-dasharray="0 100"/>
    </svg>
    <div style="display:flex; flex-direction:column;">
      <span class="goal-count" id="met-weekly" style="font-family:'JetBrains Mono',monospace; font-size:.85rem; font-weight:600; color:var(--text); line-height:1;">0/5</span>
      <span style="font-size:9px; color:var(--text3); text-transform:uppercase; letter-spacing:.05em; margin-top:2px;">This Week</span>
    </div>
  </div>
  <div style="width:1px; height:24px; background:var(--border);"></div>
  <div class="met"><span class="met-val" id="met-streak">0d</span><span class="met-lbl">Apply Streak</span></div>
</div>

<div class="filter-bar" style="height:var(--flt); background:var(--bg2); border-bottom:1px solid var(--border); padding:0 20px; display:flex; align-items:center; gap:6px;">
  <span style="font-size:10px; font-weight:600; color:var(--text3); text-transform:uppercase; letter-spacing:.08em;">Filter:</span>
  <button class="fb on" onclick="setBoardFilter('all', this)">All</button>
  <button class="fb high" onclick="setBoardFilter('high', this)">🟢 High</button>
  <button class="fb mid" onclick="setBoardFilter('medium', this)">🟡 Mid</button>
  <button class="fb str" onclick="setBoardFilter('stretch', this)">🟣 Stretch</button>
  <div style="margin-left:auto; position:relative;">
    <span style="position:absolute; left:9px; top:50%; transform:translateY(-50%); color:var(--text3); font-size:10px;">🔍</span>
    <input type="text" id="boardSearch" placeholder="Search company, role..." oninput="doBoardSearch()" style="background:var(--surface); border:1px solid var(--border); border-radius:7px; padding:4px 10px 4px 28px; font-size:11.5px; color:var(--text); width:180px; outline:none;">
  </div>
</div>

<div class="kanban-board-v3">
  <div class="kanban-col-v3" id="col-todo">
    <div class="kanban-header-v3" style="background:rgba(78,106,141,.1); border:1px solid rgba(78,106,141,.18); color:#7191b5;">
      <span>📋</span> To Apply <span class="col-count" id="count-todo" style="margin-left:auto; background:var(--surface); border:1px solid var(--border); border-radius:100px; padding:1px 7px; color:var(--text2); font-size:0.65rem;">0</span>
    </div>
    <div class="kanban-body" id="list-todo" style="display:flex; flex-direction:column; gap:8px;"></div>
  </div>
  
  <div class="kanban-col-v3" id="col-applied">
    <div class="kanban-header-v3" style="background:rgba(59,130,246,.09); border:1px solid rgba(59,130,246,.22); color:var(--blue);">
      <span>✅</span> Applied <span class="col-count" id="count-applied" style="margin-left:auto; background:var(--surface); border:1px solid var(--border); border-radius:100px; padding:1px 7px; color:var(--text2); font-size:0.65rem;">0</span>
    </div>
    <div class="kanban-body" id="list-applied" style="display:flex; flex-direction:column; gap:8px;"></div>
  </div>

  <div class="kanban-col-v3" id="col-interview">
    <div class="kanban-header-v3" style="background:rgba(16,185,129,.09); border:1px solid rgba(16,185,129,.22); color:var(--green);">
      <span>📞</span> Interview <span class="col-count" id="count-interview" style="margin-left:auto; background:var(--surface); border:1px solid var(--border); border-radius:100px; padding:1px 7px; color:var(--text2); font-size:0.65rem;">0</span>
    </div>
    <div class="kanban-body" id="list-interview" style="display:flex; flex-direction:column; gap:8px;"></div>
  </div>

  <div class="kanban-col-v3" id="col-offer">
    <div class="kanban-header-v3" style="background:rgba(245,158,11,.09); border:1px solid rgba(245,158,11,.22); color:var(--amber);">
      <span>🎉</span> Offer <span class="col-count" id="count-offer" style="margin-left:auto; background:var(--surface); border:1px solid var(--border); border-radius:100px; padding:1px 7px; color:var(--text2); font-size:0.65rem;">0</span>
    </div>
    <div class="kanban-body" id="list-offer" style="display:flex; flex-direction:column; gap:8px;"></div>
  </div>

  <div class="kanban-col-v3" id="col-rejected">
    <div class="kanban-header-v3" style="background:rgba(239,68,68,.08); border:1px solid rgba(239,68,68,.18); color:var(--red);">
      <span>❌</span> Rejected <span class="col-count" id="count-rejected" style="margin-left:auto; background:var(--surface); border:1px solid var(--border); border-radius:100px; padding:1px 7px; color:var(--text2); font-size:0.65rem;">0</span>
    </div>
    <div class="kanban-body" id="list-rejected" style="display:flex; flex-direction:column; gap:8px;"></div>
  </div>
</div>
