<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LinkedIn Safe Import | Salesforce Career Radar</title>
  <style>
    body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0e1117;color:#fff;font-family:Inter,Arial,sans-serif;padding:20px}
    .card{width:min(560px,100%);background:#161b22;border:1px solid #30363d;border-radius:16px;padding:28px;box-shadow:0 20px 60px rgba(0,0,0,.35)}
    h1{margin:0 0 8px;font-size:1.4rem;color:#60a5fa}
    p{color:#9ca3af;line-height:1.6}
    .safe{border:1px solid rgba(16,185,129,.25);background:rgba(16,185,129,.08);color:#86efac;border-radius:12px;padding:12px;margin:18px 0;font-size:.9rem}
    textarea{width:100%;min-height:180px;background:#0d1117;border:1px solid #30363d;border-radius:12px;color:white;padding:12px;box-sizing:border-box}
    button{margin-top:14px;width:100%;border:0;border-radius:12px;background:#0077b5;color:white;padding:12px;font-weight:800;cursor:pointer}
    a{color:#60a5fa}
  </style>
</head>
<body>
  <main class="card">
    <h1>LinkedIn Safe Import</h1>
    <p>This app uses Google as your account identity. For LinkedIn, use official access where configured or paste profile text here. Do not enter your LinkedIn password.</p>
    <div class="safe">Password collection is disabled by design. Paste only public/profile text you want analyzed.</div>
    <textarea id="profileText" placeholder="Paste LinkedIn profile text, skills, certifications, or experience summary..."></textarea>
    <button onclick="sendImport()">Analyze LinkedIn Text</button>
    <p><a href="javascript:window.close()">Close and return</a></p>
  </main>
  <script>
    async function sendImport() {
      const token = new URLSearchParams(location.search).get('token') || localStorage.getItem('google_auth_token');
      const text = document.getElementById('profileText').value.trim();
      if (!text) return alert('Paste profile text first.');
      const res = await fetch('/api/profile/import', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
        body: JSON.stringify({ source: 'linkedin', text })
      });
      if (!res.ok) return alert('Import failed.');
      localStorage.setItem('profile_sync_success', Date.now());
      alert('LinkedIn profile text imported safely.');
      window.close();
    }
  </script>
</body>
</html>
